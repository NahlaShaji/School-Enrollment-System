<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Enrollment Form</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        label { width: 120px; font-weight: bold; }
        input, textarea { padding: 8px; width: 300px; border: 1px solid #ccc; }
        input:disabled, textarea:disabled { background-color: #f0f0f0; cursor: not-allowed; }
        .buttons { margin-top: 20px; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body onload="resetForm()">

    <h2>Student Enrollment Form</h2>

    <div class="form-group">
        <label>Roll No:</label>
        <input type="text" id="Roll-No" onchange="checkRollNo()">
    </div>
    <div class="form-group">
        <label>Full Name:</label>
        <input type="text" id="Full-Name" disabled>
    </div>
    <div class="form-group">
        <label>Class:</label>
        <input type="text" id="Class" disabled>
    </div>
    <div class="form-group">
        <label>Birth Date:</label>
        <input type="date" id="Birth-Date" disabled>
    </div>
    <div class="form-group">
        <label>Address:</label>
        <textarea id="Address" rows="3" disabled></textarea>
    </div>
    <div class="form-group">
        <label>Enroll Date:</label>
        <input type="date" id="Enrollment-Date" disabled>
    </div>

    <div class="buttons">
        <button id="saveBtn" onclick="saveData()" disabled>Save</button>
        <button id="updateBtn" onclick="updateData()" disabled>Update</button>
        <button id="resetBtn" onclick="resetForm()">Reset</button>
    </div>

    <script>
        function resetForm() {
            // Clear all fields
            document.querySelectorAll('input, textarea').forEach(el => el.value = "");
            
            // Disable everything except Roll No
            document.getElementById("Roll-No").disabled = false;
            document.getElementById("Full-Name").disabled = true;
            document.getElementById("Class").disabled = true;
            document.getElementById("Birth-Date").disabled = true;
            document.getElementById("Address").disabled = true;
            document.getElementById("Enrollment-Date").disabled = true;
            
            // Buttons
            document.getElementById("saveBtn").disabled = true;
            document.getElementById("updateBtn").disabled = true;
            
            // Focus on Roll No
            document.getElementById("Roll-No").focus();
        }

        function checkRollNo() {
            let rollNo = document.getElementById("Roll-No").value;
            if (!rollNo) return;

            fetch('/check-roll', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({roll_no: rollNo})
            })
            .then(res => res.json())
            .then(data => {
                // Enable other fields
                document.getElementById("Full-Name").disabled = false;
                document.getElementById("Class").disabled = false;
                document.getElementById("Birth-Date").disabled = false;
                document.getElementById("Address").disabled = false;
                document.getElementById("Enrollment-Date").disabled = false;
                document.getElementById("Full-Name").focus();

                if (data.exists) {
                    // Record found: Fill form and enable Update
                    document.getElementById("Full-Name").value = data.data["Full-Name"];
                    document.getElementById("Class").value = data.data["Class"];
                    document.getElementById("Birth-Date").value = data.data["Birth-Date"];
                    document.getElementById("Address").value = data.data["Address"];
                    document.getElementById("Enrollment-Date").value = data.data["Enrollment-Date"];
                    
                    document.getElementById("Roll-No").disabled = true;
                    document.getElementById("updateBtn").disabled = false;
                    document.getElementById("saveBtn").disabled = true;
                } else {
                    // New record: Enable Save
                    document.getElementById("saveBtn").disabled = false;
                    document.getElementById("updateBtn").disabled = true;
                }
            });
        }

        function getFormData() {
            return {
                "Roll-No": document.getElementById("Roll-No").value,
                "Full-Name": document.getElementById("Full-Name").value,
                "Class": document.getElementById("Class").value,
                "Birth-Date": document.getElementById("Birth-Date").value,
                "Address": document.getElementById("Address").value,
                "Enrollment-Date": document.getElementById("Enrollment-Date").value
            };
        }

        function saveData() {
            let data = getFormData();
            if (Object.values(data).some(v => v === "")) return alert("All fields required!");

            fetch('/save-student', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => resetForm());
        }

        function updateData() {
            let data = getFormData();
            fetch('/update-student', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => resetForm());
        }
    </script>
</body>
</html>
